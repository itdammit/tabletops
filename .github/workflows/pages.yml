name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Vite requires Node.js 20.19+ or 22.12+; use Node 20 here
          node-version: "20"

      - name: Print Node/npm versions (debug)
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Debug: print run info and dist files
        run: |
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "Listing dist contents:";
          ls -la dist || true

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Debug: print run info in deploy job
        run: |
          echo "(deploy) GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "(deploy) GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER"
          echo "(deploy) GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "(deploy) Listing current workspace:"; ls -la || true
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
