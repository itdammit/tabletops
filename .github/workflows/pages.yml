name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Vite requires Node.js 20.19+ or 22.12+; use Node 20 here
          node-version: "20"

      - name: Print Node/npm versions (debug)
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: "Debug: print run info and dist files"
        run: |
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "Listing dist contents:";
          ls -la dist || true

      - name: Deploy to gh-pages branch (push dist)
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./dist
          publish_branch: gh-pages
          # use the repository token to push the branch
          github_token: ${{ secrets.GITHUB_TOKEN }}
