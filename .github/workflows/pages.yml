name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  pages:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Use Node 24 explicitly to match runner enforcement
          node-version: "24"

      - name: Print Node/npm versions (debug)
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: "Debug: print run info and dist files"
        run: |
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "Listing dist contents:";
          ls -la dist || true

      - name: Deploy to gh-pages branch (force push dist)
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Deploying to gh-pages branch"
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Deploy to gh-pages: ${GITHUB_SHA}" || echo "No changes to commit"
          # Only push if there is a commit (HEAD exists)
          if git rev-parse --verify HEAD >/dev/null 2>&1; then
            echo "Pushing to gh-pages"
            git push --force "https://x-access-token:${TOKEN}@github.com/${REPO}.git" HEAD:gh-pages
          else
            echo "No changes to deploy - skipping push"
          fi
