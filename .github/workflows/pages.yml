name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  pages:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # don't re-run this workflow when the commit is made by the actions bot
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Use Node 24 explicitly to match runner enforcement
          node-version: "24"

      - name: Print Node/npm versions (debug)
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: "Debug: print run info and dist files"
        run: |
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "Listing dist contents:";
          ls -la dist || true

      - name: Deploy to main/docs (commit built site to main)
        env:
          REPO: ${{ github.repository }}
          # Prefer a user-provided PAT (secrets.DEPLOY_TOKEN) if set, otherwise fall back to GITHUB_TOKEN
          TOKEN: ${{ secrets.DEPLOY_TOKEN != '' && secrets.DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Deploying built site to main:docs"
          # Ensure we have the repo checked out with credentials
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf docs || true
          mkdir -p docs
          cp -r dist/* docs/
          git add docs
          # Commit as the actions bot; skip creating a new run via the job-level if guard
          if git diff --staged --quiet; then
            echo "No changes to docs - skipping commit"
          else
            git commit -m "Update docs (Pages) from build ${GITHUB_SHA}"
            # Push the changes back to the main branch
            git push "https://x-access-token:${TOKEN}@github.com/${REPO}.git" HEAD:main
          fi
